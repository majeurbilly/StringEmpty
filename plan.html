<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Crystal — Plan de la présentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="assets/presentation-common.css" rel="stylesheet">
</head>
<body>
    <main id="presentation" class="relative w-screen h-screen">
        <section class="slide soft-slate flex items-center justify-center p-8">
            <div class="slide-content panel w-full max-w-6xl rounded-3xl p-12">
                <p class="eyebrow mb-3">Ordre de passage</p>
                <h1 class="mb-9 text-5xl font-bold text-white">Plan de la présentation</h1>

                <div class="card mx-auto max-w-4xl rounded-2xl p-8">
                    <ul class="list-disc space-y-5 pl-8 text-2xl text-slate-200 marker:text-blue-300">
                        <li>Introduction</li>
                        <li>
                            Présentation des quatre itérations
                            <ul class="mt-4 list-disc space-y-3 pl-9 text-xl text-slate-300 marker:text-slate-500">
                                <li>Itération 1</li>
                                <li>Itération 2</li>
                                <li>Itération 3</li>
                                <li>Itération 4</li>
                            </ul>
                        </li>
                        <li>Démonstration de l’application</li>
                        <li>Conclusion</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <nav class="pointer-events-none fixed bottom-6 left-0 right-0 z-50 flex justify-between px-10" aria-label="Navigation">
        <button id="btnPrev" onclick="prevSlide()" class="nav-btn pointer-events-auto rounded-full px-6 py-3 text-white">← Précédent</button>
        <div class="nav-counter rounded-full px-6 py-3 font-mono text-white"><span id="slideIndicator">1</span> / <span id="totalIndicator"></span></div>
        <button id="btnNext" onclick="nextSlide()" class="nav-btn pointer-events-auto rounded-full px-6 py-3 text-white">Suivant →</button>
    </nav>
    <script src="assets/presentation-common.js"></script>
</body>
</html>
